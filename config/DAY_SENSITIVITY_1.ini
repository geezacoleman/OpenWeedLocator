[System]
# select your algorithm
algorithm = exhsv
# operate on a video, image or directory of media
input_file_or_directory =
# choose how many relays are connected to the OWL
relay_num = 4
actuation_duration = 0.15
delay = 0

[MQTT]
# MQTT Communication - Enable for dashboard or networked control
enable = False
# Use 'localhost' for standalone, or the controller IP for networked
broker_ip = 192.168.1.2
# Standard MQTT port
broker_port = 1883
# Unique identifier for this OWL
device_id = auto

[WebDashboard]
# Internal Flask port (not exposed, proxied via Nginx)
port = 8000

[Network]
# standalone or networked
mode = networked
# This OWL's static IP
static_ip = 192.168.1.11
# Central controller IP (for networked mode)
controller_ip = 192.168.1.2

[GPS]
# none, dashboard, or hat
source = none
# Only for GPS hat
port = /dev/ttyUSB0
baudrate = 9600

[Controller]
# choose between 'none', 'ute', 'advanced', 'networked' - do not use '' or "". Just plain text only.
controller_type = none

# for advanced controller
detection_mode_pin_up = 36
detection_mode_pin_down = 35
recording_pin = 38
sensitivity_pin = 40
low_sensitivity_config = config/DAY_SENSITIVITY_1.ini
medium_sensitivity_config = config/DAY_SENSITIVITY_2.ini
high_sensitivity_config = config/DAY_SENSITIVITY_3.ini

# for UteController
switch_purpose = recording
switch_pin = 37

[Visualisation]
image_loop_time = 5

[Camera]
resolution_width = 416
resolution_height = 320
exp_compensation = -2
crop_factor_horizontal = 0.02
crop_factor_vertical = 0.02

[GreenOnGreen]
# parameters related to green-on-green detection
model_path = models
confidence = 0.5
class_filter_id = None

[GreenOnBrown]
# parameters related to green-on-brown detection
exg_min = 25
exg_max = 200
hue_min = 41
hue_max = 80
saturation_min = 52
saturation_max = 218
brightness_min = 62
brightness_max = 188
min_detection_area = 20
invert_hue = False

[DataCollection]
# all data collection related parameters
# set sample_images True/False to enable/disable image collection
image_sample_enable = False
# set to True to disable weed detection for data collection only
detection_enable = True
# image collection, sample method include: 'bbox' | 'square' | 'whole'
sample_method = whole
sample_frequency = 30
save_directory = /media/owl/SanDisk
# elog fps
log_fps = False
camera_name = cam1

[Relays]
# defines the relay ID (left) that matches to a boardpin (right) on the Pi.
# Only change if you rewire/change the relay connections.
0 = 13
1 = 15
2 = 16
3 = 18


