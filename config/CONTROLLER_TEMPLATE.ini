# =============================================================================
# CONTROLLER.ini — OWL Infrastructure Configuration
# =============================================================================
#
# This file controls how the OWL communicates with dashboards, networks,
# and GPS devices. It is SEPARATE from the detection preset files
# (DAY_SENSITIVITY_1/2/3.ini) which control weed detection parameters.
#
# HOW TO USE:
#   This template is for reference only — it is NOT read by OWL software.
#   The actual CONTROLLER.ini is created automatically when you run:
#
#       sudo bash controller/shared/setup.sh
#
#   (called during owl_setup.sh when you select "yes" to dashboard setup)
#
#   If you need to create or edit CONTROLLER.ini manually, copy this file:
#
#       cp config/CONTROLLER_TEMPLATE.ini config/CONTROLLER.ini
#
#   Then edit the values below to match your setup.
#
# WITHOUT THIS FILE:
#   If CONTROLLER.ini does not exist, OWL runs in basic detection-only mode
#   with no MQTT, no web dashboard, and no remote control. This is the default
#   for a fresh install before setup.sh has been run.
#
# =============================================================================

[MQTT]
# Enable MQTT communication between owl.py and the web dashboard.
# Set to False to disable all dashboard/remote control features.
enable = True

# IP address of the MQTT broker.
#   Standalone mode: use "localhost" (broker runs on the same Pi)
#   Networked mode:  use the IP of the central controller (e.g. 192.168.1.2)
broker_ip = localhost

# MQTT broker port. Default 1883 is standard for unencrypted MQTT.
broker_port = 1883

# Unique identifier for this OWL device on the MQTT network.
# Set to "auto" to use the Pi's hostname (e.g. owl-1), or specify manually.
# Each OWL on a network MUST have a unique device_id.
device_id = auto

[WebDashboard]
# Port for the Flask web dashboard (standalone mode only).
# Nginx proxies HTTPS (port 443) to this internal port.
port = 8000

[Network]
# Operation mode — determines MQTT topic structure and network behaviour.
#
#   standalone — OWL creates its own WiFi hotspot and runs a local MQTT broker.
#                The standalone dashboard (controller/standalone/) connects locally.
#                MQTT topics: owl/state, owl/commands (flat, no device ID)
#
#   networked  — OWL connects to an existing WiFi network and publishes to a
#                remote MQTT broker on the central controller.
#                The networked dashboard (controller/networked/) discovers OWLs
#                automatically via device-specific MQTT topics.
#                MQTT topics: owl/{device_id}/state, owl/{device_id}/commands
#
mode = standalone

# Static IP address assigned to this OWL.
#   Standalone mode: always 10.42.0.1 (hotspot gateway)
#   Networked mode:  the static IP configured during setup (e.g. 192.168.1.11)
static_ip = localhost

# IP address of the central controller (networked mode only).
# In standalone mode this is ignored — set to "localhost" for clarity.
controller_ip = localhost

[GPS]
# ===========================================================================
#  GPS Configuration
#  This section controls the GPS/NMEA input used by owl.py (on-Pi detection)
#  and the networked controller dashboard. A valid GPS fix enables:
#    - Speed-adaptive solenoid actuation timing
#    - Track recording as GeoJSON breadcrumbs for the map display
#    - Session stats: distance travelled, time active, hectares sprayed
#
#  In networked mode, individual OWL units automatically defer to the
#  central controller for GPS — only the controller needs real GPS hardware.
# ===========================================================================

# --- source ----------------------------------------------------------------
# Where the controller reads NMEA sentences from. Pick ONE:
#
#   none     GPS disabled entirely. No map, no speed-adaptive actuation,
#            no track recording. (Default — safe for bench testing.)
#
#   serial   Read NMEA from a USB or UART serial device plugged directly
#            into this Pi. Use this for Ublox USB dongles, Adafruit GPS
#            HATs, or any GPS module that exposes a /dev/tty* device.
#            Requires pyserial (already in the venv — no extra install).
#
#   tcp      Listen on a TCP port for NMEA sentences pushed from a router
#            (e.g. Teltonika RUTX14). The router handles the GPS hardware
#            and streams NMEA over the network to this controller.
#
#   gpsd     Read from the Linux gpsd daemon running on localhost:2947.
#            Useful when multiple apps on the same Pi need GPS, or when
#            you want gpsd to handle reconnects, device probing, and
#            SBAS corrections. Requires `apt install gpsd gpsd-clients`
#            (the in-cab setup script installs it for you if selected).
source = none

# --- port (serial device path) ---------------------------------------------
# Path to the serial device file. ONLY used when source = serial (and as a
# hint to gpsd's DEVICES setting when source = gpsd).
#
# Common device paths:
#   /dev/ttyACM0   Ublox USB GPS receivers (most modern USB dongles)
#   /dev/ttyACM1   Second Ublox device, or on systems with Sixfab HATs
#   /dev/ttyUSB0   CP2102/CH340/Prolific USB-to-serial adapters
#   /dev/ttyAMA0   Raspberry Pi primary UART (header pins 8 & 10)
#   /dev/serial0   Symlink to the active Pi UART on Bookworm
#
# To find your device: plug in the GPS, run `ls /dev/ttyACM* /dev/ttyUSB*`
# or `dmesg | tail -20` to see which node appeared.
port = /dev/ttyACM0

# --- baudrate --------------------------------------------------------------
# Serial link speed in bits per second. ONLY used when source = serial.
#
# Common baud rates:
#    9600   Ublox factory default (most USB GPS dongles ship at 9600)
#   38400   NMEA 0183 v2 standard
#   57600   Some marine GPS modules
#  115200   Ublox high-speed mode, Sixfab GNSS HAT, u-center configured
#
# Wrong baud rate = silent failure (garbled unicode replacement chars in
# the log). If unsure, try 9600 first, then 115200.
baudrate = 9600

# ---------------------------------------------------------------------------
#  Networked controller TCP listener (only relevant when source = tcp)
# ---------------------------------------------------------------------------

# --- enable (DEPRECATED) ---------------------------------------------------
# Legacy flag kept for backward compatibility with older configs. If you
# leave `source = none` but set `enable = True`, the controller will behave
# as if `source = tcp` were set. New installations should set `source`
# directly and leave `enable = False`.
enable = False

# --- nmea_port -------------------------------------------------------------
# TCP port the controller listens on for incoming NMEA data when
# source = tcp. Configure your Teltonika (or other router) to forward NMEA
# sentences to <controller-ip>:<nmea_port>.
#
# Port 8500 is opened by setup.sh in the UFW firewall rules. If you change
# this, update your firewall rule accordingly:
#   sudo ufw allow 8500/tcp
nmea_port = 8500

# ---------------------------------------------------------------------------
#  Session / coverage tracking (applies to every non-none source)
# ---------------------------------------------------------------------------

# --- boom_width ------------------------------------------------------------
# Spray boom width in METRES. Used to convert track distance into sprayed
# area for the hectares readout on the GPS tab.
#
#   Area (hectares) = distance_travelled_km × boom_width_m ÷ 10
#
# Examples:
#   3.0    Small self-propelled boom / ATV-mounted sprayer
#   6.0    Ute-mounted or linkage boom
#  12.0    Small trailed sprayer (default)
#  24.0    Medium trailed sprayer
#  36.0    Large self-propelled or trailed sprayer
boom_width = 12.0

# --- track_save_directory --------------------------------------------------
# Directory where GeoJSON track files are written. Relative to the project
# root (i.e. wherever networked.py is launched from).
#
# One new file is created per detection session, named
#   track_YYYY-MM-DD_HHMMSS.geojson
# Old tracks are never deleted automatically — monitor disk usage on
# long-running kiosk installs.
#
# The GPS tab map loads the latest file's points as breadcrumbs.
track_save_directory = tracks
