<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWL Central Controller</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='images/owl-logo-wht.png') }}" alt="OWL Logo" class="logo">
            <h1>OWL Controller</h1>
        </div>
        <div class="status-indicator">
            <div class="owl-status">
                <span class="status-dot connected" id="statusDot"></span>
                <span id="statusText">Controller Active</span>
            </div>
        </div>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>Connected OWLs (<span id="owl-count">0</span>)</h2>
        <div class="dashboard-grid" id="owls-grid">
            <p>Scanning for OWLs...</p>
        </div>
    </div>

    <div class="card">
        <h2>Global Green-on-Brown Controls</h2>
        <p class="metadata-description">These sliders send commands to ALL connected OWLs.</p>

        <div class="form-grid" id="greenonbrown-controls">

            </div>
    </div>

</div> <footer>
    <div class="footer-content">
        <p>OpenWeedLocator © 2025 | Central Controller</p>
    </div>
</footer>

</body>
</html>
