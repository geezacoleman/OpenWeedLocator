<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OWL Central Controller</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-content">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='images/owl-logo-wht.png') }}" alt="OWL Logo" class="logo">
            <h1>OWL Controller</h1>
        </div>
        <div class="status-indicator">
            <div class="owl-status">
                <span class="status-dot" id="mqtt-status-dot"></span>
                <span id="mqtt-status-text">Connecting...</span>
            </div>
            <!-- NEW: toggle button for side panel -->
            <button id="open-config-btn" class="toolbar-btn" type="button">
                Config
            </button>
        </div>
    </div>
</div>

<!-- Main Container (no tabs now) -->
<div class="container" id="main-container">
    <div class="dashboard-grid" id="owls-grid">
        <p style="text-align: center; color: var(--text); padding: 2rem;">
            Scanning for OWLs...
        </p>
    </div>
</div>

<!-- Slide-in Config Panel -->
<div id="config-panel" class="config-panel">
    <div class="config-panel-header">
        <h2>Green-on-Brown</h2>
        <button id="close-config-btn" class="toolbar-btn secondary" type="button">Close</button>
    </div>

    <div class="config-panel-body">
        <div class="target-row">
            <label for="target-owl-select">Target:</label>
            <select id="target-owl-select">
                <option value="all">All OWLs</option>
            </select>
        </div>
        <p class="metadata-description">
            Adjust detection parameters. Changes are sent immediately.
        </p>
        <div class="form-grid" id="greenonbrown-controls">
            <!-- sliders injected by JS -->
        </div>
    </div>
</div>

<!-- Video Feed Modal -->
<div id="video-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="video-modal-title">OWL Video Feed</h3>
            <button class="modal-close" onclick="closeVideoModal()">&times;</button>
        </div>
        <div class="modal-body">
            <img id="video-feed-img" src="" alt="Video Feed" style="width: 100%; height: auto; border-radius: 8px;">
        </div>
    </div>
</div>

<!-- Footer (thin) -->
<footer>
    <div class="footer-content">
        <p>OpenWeedLocator © 2025 | <span id="last-update">--</span></p>
    </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
